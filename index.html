<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphy — The Graphing Software.</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.8/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #e4e4eb;
      --panel: #171730;
      --panel2: #2a2a52;
      --border: #838392;
      --border2: #a3a3ba;
      --text: #868aa1;
      --text-dim: #aaaaca;
      --text-mid: #c3c3d7;
      --accent: #4fffb0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 50px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
      user-select: none;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo em { color: #4fffb0; font-style: normal; }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .header-hint {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 290px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-title {
      padding: 12px 16px;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .functions-list { flex: 1; overflow-y: auto; padding: 8px; }

    /* ── Function item ── */
    .fn-item {
      border: 1px solid var(--border);
      border-radius: 9px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .fn-item.focused { border-color: var(--fn-color, #4fffb0); }

    .fn-header {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      gap: 7px;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
    }
    .fn-swatch {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--fn-color, #4fffb0);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--fn-color, #4fffb0);
    }
    .fn-label-text {
      font-size: 11px;
      color: var(--text-mid);
      flex: 1;
    }
    .fn-vis-btn, .fn-del-btn {
      background: none; border: none;
      cursor: pointer; font-size: 13px;
      padding: 2px 5px; border-radius: 4px;
      transition: all 0.15s; line-height: 1;
    }
    .fn-vis-btn { color: var(--fn-color, #4fffb0); }
    .fn-vis-btn.hidden { color: var(--text-dim); }
    .fn-del-btn { color: var(--text-dim); }
    .fn-del-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.12); }

    .fn-input-row { padding: 8px 10px 6px; }
    .fn-input {
      width: 100%;
      background: transparent; border: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      outline: none;
    }
    .fn-input::placeholder { color: var(--text-dim); }

    .fn-preview {
      padding: 4px 12px 8px;
      min-height: 28px;
    }
    .fn-preview .katex { font-size: 15px; }
    .fn-preview .katex-html { color: var(--text); }

    .fn-error-text {
      font-size: 10px; color: #ff6b6b;
      padding: 0 12px 8px;
      font-family: 'Space Mono', monospace;
    }

    .add-fn-btn {
      margin: 4px 8px 8px;
      padding: 9px 12px;
      background: transparent;
      border: 1px dashed var(--border2);
      color: var(--text-mid);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .add-fn-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #e4e4eb;
    }

    .sidebar-footer {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
    }
    .reset-btn {
      padding: 7px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-mid);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s; width: 100%;
    }
    .reset-btn:hover { color: var(--text); border-color: var(--text-mid); }
    .view-info {
      font-size: 9px; color: var(--text-dim);
      text-align: center; letter-spacing: 0.5px;
    }

    /* ── Canvas ── */
    .graph-wrap { flex: 1; position: relative; overflow: hidden; }
    #graph-canvas {
      display: block; width: 100%; height: 100%;
      cursor: crosshair;
    }
    #graph-canvas.dragging { cursor: grabbing; }
    .coords-pill {
      position: absolute; bottom: 12px; right: 14px;
      background: rgba(11,11,20,0.85);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10px; color: var(--text-mid);
      backdrop-filter: blur(10px);
      pointer-events: none;
      letter-spacing: 0.5px;
    }

    /* ── Keyboard ── */
    .keyboard-panel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .keyboard-header {
      display: flex; align-items: center;
      padding: 7px 16px;
      cursor: pointer; user-select: none;
      font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.15s;
    }
    .keyboard-header:hover { color: var(--text); }
    .keyboard-header .kh-arrow { margin-left: auto; font-size: 10px; }

    .keyboard-body {
      padding: 8px 12px 10px;
      display: flex; gap: 14px;
      overflow-x: auto;
      border-top: 1px solid var(--border);
    }
    .key-group { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .key-group-label {
      font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 1px;
    }
    .key-row { display: flex; gap: 4px; }
    .key-btn {
      padding: 5px 9px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap; line-height: 1.3;
    }
    .key-btn:hover {
      background: #b9b9c2;
      border-color: rgba(79,255,176,0.5);
      color: var(--accent);
    }
    .key-btn:active { transform: scale(0.93); }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── KaTeX override ── */
    .katex { color: var(--text) !important; }
    .katex-html { white-space: normal !important; }

    /* Legend on canvas */
    .fn-legend {
      position: absolute;
      top: 12px; left: 12px;
      display: flex; flex-direction: column; gap: 4px;
      pointer-events: none;
    }
    .fn-legend-item {
      display: flex; align-items: center; gap: 6px;
      background: rgba(11,11,20,0.75);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 10px;
      border-left: 2px solid var(--lc);
      color: var(--text-mid);
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Graphy.<em>io</em></div>
  </div>
  <span class="header-hint">scroll to zoom · drag to pan · enter to add function</span>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Functions</div>
    <div class="functions-list" id="functions-list"></div>
    <button class="add-fn-btn" id="add-fn-btn">＋ Add function</button>
    <div class="sidebar-footer">
      <button class="reset-btn" id="reset-btn">↺ Reset view</button>
      <div class="view-info" id="view-info">x: [−10, 10]  y: [−7, 7]</div>
    </div>
  </div>

  <!-- Graph -->
  <div class="graph-wrap" id="graph-wrap">
    <canvas id="graph-canvas"></canvas>
    <div class="coords-pill" id="coords-pill">x: 0.000 &nbsp; y: 0.000</div>
  </div>
</div>

<!-- Math Keyboard -->
<div class="keyboard-panel" id="keyboard-panel">
  <div class="keyboard-header" id="keyboard-header">
    <span>⌨&nbsp;&nbsp;Math Keyboard</span>
    <span class="kh-arrow" id="kh-arrow">▲</span>
  </div>
  <div class="keyboard-body" id="keyboard-body"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════
const FN_COLORS = [
  '#4fffb0', '#ff6b6b', '#fbbf24', '#a78bfa',
  '#38bdf8', '#fb923c', '#f472b6', '#34d399'
];

let functions = [];
let fnIdCounter = 0;
let activeFnId = null;

let view = { xMin: -10, xMax: 10, yMin: -7, yMax: 7 };
let isDragging = false;
let dragOrigin = null;
let dragViewSnap = null;

const DPR = window.devicePixelRatio || 1;

// ═══════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById('graph-canvas');
const ctx = canvas.getContext('2d');
const graphWrap = document.getElementById('graph-wrap');

function resizeCanvas() {
  const w = graphWrap.clientWidth;
  const h = graphWrap.clientHeight;
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  drawAll();
}

const resizeObs = new ResizeObserver(resizeCanvas);
resizeObs.observe(graphWrap);

// ═══════════════════════════════════════════
// COORDINATE TRANSFORMS
// ═══════════════════════════════════════════
const W = () => canvas.width;
const H = () => canvas.height;

const toCanvasX = mx => (mx - view.xMin) / (view.xMax - view.xMin) * W();
const toCanvasY = my => H() - (my - view.yMin) / (view.yMax - view.yMin) * H();
const toMathX   = cx => view.xMin + cx / W() * (view.xMax - view.xMin);
const toMathY   = cy => view.yMin + (H() - cy) / H() * (view.yMax - view.yMin);

// ═══════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════
function niceStep(range, targetTicks = 10) {
  const raw = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const n = raw / mag;
  return (n < 1.5 ? 1 : n < 3 ? 2 : n < 7 ? 5 : 10) * mag;
}

function formatTick(val) {
  const s = parseFloat(val.toPrecision(5)).toString();
  return s.length > 7 ? val.toExponential(2) : s;
}

function drawAll() {
  const Wc = W(), Hc = H();
  ctx.clearRect(0, 0, Wc, Hc);

  // Background
  ctx.fillStyle = '#2a2a52';
  ctx.fillRect(0, 0, Wc, Hc);

  const xRange = view.xMax - view.xMin;
  const yRange = view.yMax - view.yMin;
  const step = niceStep(Math.max(xRange, yRange));

  const xStart = Math.ceil(view.xMin / step) * step;
  const yStart = Math.ceil(view.yMin / step) * step;

  // Minor grid lines
  ctx.lineWidth = 1;
  for (let x = Math.floor(view.xMin / step) * step; x <= view.xMax + step; x += step) {
    const cx = toCanvasX(x);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, Hc); ctx.stroke();
  }
  for (let y = Math.floor(view.yMin / step) * step; y <= view.yMax + step; y += step) {
    const cy = toCanvasY(y);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(Wc, cy); ctx.stroke();
  }

  // Axes
  const axX = toCanvasX(0);
  const axY = toCanvasY(0);
  ctx.lineWidth = 1.5 * DPR;

  if (axX >= 0 && axX <= Wc) {
    const grad = ctx.createLinearGradient(0, 0, 0, Hc);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.22)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.beginPath(); ctx.moveTo(axX, 0); ctx.lineTo(axX, Hc); ctx.stroke();
  }
  if (axY >= 0 && axY <= Hc) {
    const grad = ctx.createLinearGradient(0, 0, Wc, 0);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.22)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.beginPath(); ctx.moveTo(0, axY); ctx.lineTo(Wc, axY); ctx.stroke();
  }

  // Tick marks & labels
  const FONT_SIZE = 10 * DPR;
  ctx.font = `${FONT_SIZE}px 'Space Mono', monospace`;
  const TICK = 4 * DPR;
  const CLAMP_AX = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const clampedAxX = CLAMP_AX(axX, 30 * DPR, Wc - 4);
  const clampedAxY = CLAMP_AX(axY, 4, Hc - 18 * DPR);

  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.fillStyle = 'rgba(255,255,255,0.32)';

  // X ticks
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let x = xStart; x <= view.xMax + step * 0.01; x += step) {
    if (Math.abs(x) < step * 0.01) continue;
    const cx = toCanvasX(x);
    if (cx < 0 || cx > Wc) continue;
    ctx.beginPath();
    ctx.moveTo(cx, clampedAxY - TICK);
    ctx.lineTo(cx, clampedAxY + TICK);
    ctx.stroke();
    ctx.fillText(formatTick(x), cx, clampedAxY + TICK + 2);
  }

  // Y ticks
  ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let y = yStart; y <= view.yMax + step * 0.01; y += step) {
    if (Math.abs(y) < step * 0.01) continue;
    const cy = toCanvasY(y);
    if (cy < 0 || cy > Hc) continue;
    ctx.beginPath();
    ctx.moveTo(clampedAxX - TICK, cy);
    ctx.lineTo(clampedAxX + TICK, cy);
    ctx.stroke();
    ctx.fillText(formatTick(y), clampedAxX - TICK - 3, cy);
  }

  // Origin
  if (axX >= 0 && axX <= Wc && axY >= 0 && axY <= Hc) {
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillText('0', axX - 5, axY + 5);
  }

  // Axis arrows + labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5 * DPR;
  const ARW = 7 * DPR;
  if (axY >= 0 && axY <= Hc) {
    ctx.beginPath();
    ctx.moveTo(Wc - ARW * 1.8, axY - ARW * 0.6);
    ctx.lineTo(Wc, axY);
    ctx.lineTo(Wc - ARW * 1.8, axY + ARW * 0.6);
    ctx.stroke();
    ctx.font = `italic ${12 * DPR}px Georgia, serif`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('x', Wc - 3, axY - 2);
  }
  if (axX >= 0 && axX <= Wc) {
    ctx.beginPath();
    ctx.moveTo(axX - ARW * 0.6, ARW * 1.8);
    ctx.lineTo(axX, 0);
    ctx.lineTo(axX + ARW * 0.6, ARW * 1.8);
    ctx.stroke();
    ctx.font = `italic ${12 * DPR}px Georgia, serif`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('y', axX + 4, 2);
  }

  // Draw functions
  functions.forEach(fn => {
    if (fn.visible && fn.compiled) drawFunction(fn);
  });

  // Update view info
  document.getElementById('view-info').textContent =
    `x: [${view.xMin.toFixed(2)}, ${view.xMax.toFixed(2)}]  y: [${view.yMin.toFixed(2)}, ${view.yMax.toFixed(2)}]`;
}

function drawFunction(fn) {
  const Wc = W(), Hc = H();
  const steps = Math.ceil(Wc * 1.5);
  const dx = (view.xMax - view.xMin) / steps;
  const yRange = view.yMax - view.yMin;

  ctx.save();
  ctx.strokeStyle = fn.color;
  ctx.lineWidth = 2.2 * DPR;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.shadowColor = fn.color;
  ctx.shadowBlur = 5 * DPR;

  ctx.beginPath();
  let penDown = false;
  let prevY = null;

  for (let i = 0; i <= steps; i++) {
    const x = view.xMin + i * dx;
    let y;
    try {
      y = fn.compiled.evaluate({ x });
      if (typeof y !== 'number' || !isFinite(y) || isNaN(y)) throw 0;
    } catch (_) {
      penDown = false; prevY = null; continue;
    }

    const cx = toCanvasX(x);
    const cy = toCanvasY(y);
    const discontinuous = prevY !== null && Math.abs(y - prevY) > yRange * 3;

    if (!penDown || discontinuous) {
      ctx.moveTo(cx, cy); penDown = true;
    } else {
      ctx.lineTo(cx, cy);
    }
    prevY = y;
  }
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════
function evPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * DPR,
    y: (src.clientY - rect.top) * DPR
  };
}

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragOrigin = evPos(e);
  dragViewSnap = { ...view };
  canvas.classList.add('dragging');
});

canvas.addEventListener('mousemove', e => {
  const pos = evPos(e);
  const mx = toMathX(pos.x).toFixed(3);
  const my = toMathY(pos.y).toFixed(3);
  document.getElementById('coords-pill').innerHTML = `x: ${mx} &nbsp; y: ${my}`;

  if (!isDragging) return;
  const dxPx = pos.x - dragOrigin.x;
  const dyPx = pos.y - dragOrigin.y;
  const dxM = dxPx / W() * (dragViewSnap.xMax - dragViewSnap.xMin);
  const dyM = dyPx / H() * (dragViewSnap.yMax - dragViewSnap.yMin);
  view.xMin = dragViewSnap.xMin - dxM;
  view.xMax = dragViewSnap.xMax - dxM;
  view.yMin = dragViewSnap.yMin + dyM;
  view.yMax = dragViewSnap.yMax + dyM;
  drawAll();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.classList.remove('dragging');
});
canvas.addEventListener('mouseleave', () => {
  if (isDragging) { isDragging = false; canvas.classList.remove('dragging'); }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const pos = evPos(e);
  const mx = toMathX(pos.x);
  const my = toMathY(pos.y);
  const factor = e.deltaY > 0 ? 1.12 : 1 / 1.12;
  view.xMin = mx + (view.xMin - mx) * factor;
  view.xMax = mx + (view.xMax - mx) * factor;
  view.yMin = my + (view.yMin - my) * factor;
  view.yMax = my + (view.yMax - my) * factor;
  drawAll();
}, { passive: false });

// ═══════════════════════════════════════════
// FUNCTION MANAGEMENT
// ═══════════════════════════════════════════
function compileFn(fn) {
  const expr = fn.expr.trim();
  if (!expr) { fn.compiled = null; fn.latex = ''; fn.error = null; return; }
  try {
    const parsed = math.parse(expr);
    fn.compiled = parsed.compile();
    fn.latex = parsed.toTex({ parenthesis: 'auto' });
    fn.error = null;
  } catch (e) {
    fn.compiled = null; fn.latex = ''; fn.error = 'Invalid expression';
  }
}

function addFunction(expr = '') {
  const id = fnIdCounter++;
  const color = FN_COLORS[functions.length % FN_COLORS.length];
  const fn = { id, expr, color, compiled: null, visible: true, latex: '', error: null };
  functions.push(fn);
  if (expr) compileFn(fn);
  renderSidebar();
  // Focus new input
  requestAnimationFrame(() => {
    const inp = document.getElementById(`fi-${id}`);
    if (inp) { inp.focus(); activeFnId = id; }
  });
}

function removeFunction(id) {
  functions = functions.filter(f => f.id !== id);
  if (activeFnId === id) activeFnId = functions.length ? functions[functions.length - 1].id : null;
  renderSidebar(); drawAll();
}

function toggleVisible(id) {
  const fn = functions.find(f => f.id === id);
  if (fn) { fn.visible = !fn.visible; renderSidebar(); drawAll(); }
}

function onInput(id, val) {
  const fn = functions.find(f => f.id === id);
  if (!fn) return;
  fn.expr = val;
  compileFn(fn);
  updateFnUI(fn);
  drawAll();
}

function updateFnUI(fn) {
  const previewEl = document.getElementById(`fp-${fn.id}`);
  const errorEl   = document.getElementById(`fe-${fn.id}`);
  const itemEl    = document.getElementById(`fitem-${fn.id}`);
  if (!previewEl) return;

  if (fn.latex) {
    try {
      katex.render(fn.latex, previewEl, { throwOnError: false, displayMode: false });
      errorEl.textContent = '';
    } catch (_) { previewEl.innerHTML = ''; }
  } else {
    previewEl.innerHTML = '';
    errorEl.textContent = fn.error && fn.expr ? fn.error : '';
  }
  itemEl?.classList.toggle('focused', activeFnId === fn.id);
}

function renderSidebar() {
  const list = document.getElementById('functions-list');
  list.innerHTML = '';

  functions.forEach((fn, idx) => {
    const item = document.createElement('div');
    item.className = 'fn-item' + (activeFnId === fn.id ? ' focused' : '');
    item.id = `fitem-${fn.id}`;
    item.style.setProperty('--fn-color', fn.color);

    item.innerHTML = `
      <div class="fn-header">
        <div class="fn-swatch" style="background:${fn.color};box-shadow:0 0 6px ${fn.color}"></div>
        <span class="fn-label-text">f<sub>${idx + 1}</sub>(x) =</span>
        <button class="fn-vis-btn ${fn.visible ? '' : 'hidden'}"
          onclick="toggleVisible(${fn.id})" title="${fn.visible ? 'Hide' : 'Show'}"
          style="color:${fn.visible ? fn.color : 'var(--text-dim)'}">
          ${fn.visible ? '◉' : '○'}
        </button>
        <button class="fn-del-btn" onclick="removeFunction(${fn.id})" title="Remove">✕</button>
      </div>
      <div class="fn-input-row">
        <input
          type="text" id="fi-${fn.id}" class="fn-input"
          placeholder="e.g. sin(x)^2 + x/3"
          value="${fn.expr.replace(/"/g, '&quot;')}"
          autocomplete="off" spellcheck="false"
        >
      </div>
      <div class="fn-preview" id="fp-${fn.id}"></div>
      <div class="fn-error-text" id="fe-${fn.id}"></div>
    `;

    list.appendChild(item);

    // Re-render KaTeX if has latex
    if (fn.latex) {
      try {
        katex.render(fn.latex, item.querySelector(`#fp-${fn.id}`),
          { throwOnError: false, displayMode: false });
      } catch(_) {}
    }
    if (fn.error && fn.expr) {
      const errEl = item.querySelector(`#fe-${fn.id}`);
      if (errEl) errEl.textContent = fn.error;
    }

    const inp = item.querySelector(`#fi-${fn.id}`);
    inp.addEventListener('input', e => onInput(fn.id, e.target.value));
    inp.addEventListener('focus', () => {
      activeFnId = fn.id;
      document.querySelectorAll('.fn-item').forEach(el => el.classList.remove('focused'));
      item.classList.add('focused');
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addFunction(); }
    });
  });
}

function insertAtCursor(text) {
  // Ensure there's a function to type into
  if (functions.length === 0) { addFunction(); return; }
  if (activeFnId === null) { activeFnId = functions[0].id; }

  const inp = document.getElementById(`fi-${activeFnId}`);
  if (!inp) return;
  inp.focus();

  const s = inp.selectionStart ?? inp.value.length;
  const e = inp.selectionEnd   ?? inp.value.length;
  inp.value = inp.value.slice(0, s) + text + inp.value.slice(e);
  inp.setSelectionRange(s + text.length, s + text.length);
  onInput(activeFnId, inp.value);
}

function renderKeyboard() {
  const body = document.getElementById('keyboard-body');
  body.innerHTML = '';
  KB_GROUPS.forEach(grp => {
    const g = document.createElement('div');
    g.className = 'key-group';
    const lbl = document.createElement('div');
    lbl.className = 'key-group-label';
    lbl.textContent = grp.label;
    g.appendChild(lbl);
    grp.rows.forEach(row => {
      const r = document.createElement('div');
      r.className = 'key-row';
      row.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key-btn';
        btn.textContent = k.d;
        btn.title = k.v;
        btn.addEventListener('mousedown', ev => {
          ev.preventDefault(); // keep input focused
          insertAtCursor(k.v);
        });
        r.appendChild(btn);
      });
      g.appendChild(r);
    });
    body.appendChild(g);
  });
}
